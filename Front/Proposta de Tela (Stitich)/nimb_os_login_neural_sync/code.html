<script>
        // Micro-interaction: Mouse parallax on the container
        document.addEventListener('mousemove', (e) => {
            const container = document.querySelector('main');
            const xAxis = (window.innerWidth / 2 - e.pageX) / 45;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 45;
            container.style.transform = `perspective(1000px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Input focus states for the whole form
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.closest('.input-glow').classList.add('border-primary/60');
            });
            input.addEventListener('blur', () => {
                input.closest('.input-glow').classList.remove('border-primary/60');
            });
        });
    </script>
