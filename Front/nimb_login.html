<style>
  .glitch-overlay {
    background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.1) 0px, rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
    background-size: 100% 2px;
    pointer-events: none;
  }
  .rim-light { box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.05); }
  .primary-gradient { background: linear-gradient(135deg, #ae71ff 0%, #43e090 100%); }
  .primary-gradient:hover {
    box-shadow: 0 0 20px rgba(174,113,255,0.3);
    transform: scale(1.02);
  }
  .primary-gradient:disabled {
    opacity: 0.6;
    transform: none;
    cursor: not-allowed;
  }
  .input-glow:focus-within { box-shadow: 0 0 12px rgba(162,89,255,0.2); }
  @keyframes scanline {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }
  .scan-effect::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent, rgba(216,185,255,0.05), transparent);
    animation: scanline 8s linear infinite;
  }
  @keyframes glitch-pulse {
    0%, 100% { opacity: 0.3; transform: translateX(0); }
    50% { opacity: 0.6; transform: translateX(2px); }
  }
  .glitch-line { animation: glitch-pulse 3s ease-in-out infinite; }
  .glitch-line-2 { animation: glitch-pulse 3s ease-in-out infinite 0.5s; }

  /* Toast notification */
  #toast {
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
  }
  #toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* Loading spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  /* Google button custom style */
  .google-btn {
    background: rgba(26, 26, 46, 0.5);
    border: 1px solid rgba(75, 68, 84, 0.4);
    transition: all 0.2s ease;
  }
  .google-btn:hover {
    background: rgba(57, 56, 64, 0.5);
    border-color: rgba(216, 185, 255, 0.3);
  }
  .google-btn:active { transform: scale(0.98); }

  /* Auth success overlay */
  #auth-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(13,13,26,0.95);
    backdrop-filter: blur(12px);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #auth-overlay.active { display: flex; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-in { animation: fadeInUp 0.4s ease forwards; }

  /* Field focus border */
  .input-glow.focused { border-color: rgba(216, 185, 255, 0.6); }

  /* Error state */
  .input-error { border-color: rgba(255, 180, 171, 0.6) !important; }
  .error-msg { color: #ffb4ab; font-size: 11px; margin-top: 4px; display: none; }
  .error-msg.show { display: block; }
</style>

<script>
// ─────────────────────────────────────────────
//  CONFIGURATION
//  Substitua YOUR_GOOGLE_CLIENT_ID pelo Client ID
//  gerado no Google Cloud Console:
//  https://console.cloud.google.com/apis/credentials
// ─────────────────────────────────────────────
// const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';
const GOOGLE_CLIENT_ID = "206311955231-snagkrvmjtpgk1q2375n03h9g3ve6pet.apps.googleusercontent.com";
// Após login bem-sucedido, redireciona para esta URL.
// Troque pelo caminho do seu app principal (ex: './app.html').
const REDIRECT_URL = './app.html';

// ─────────────────────────────────────────────
//  DOM REFS
// ─────────────────────────────────────────────
const emailInput    = document.getElementById('email');
const tokenInput    = document.getElementById('token');
const emailWrapper  = document.getElementById('email-wrapper');
const tokenWrapper  = document.getElementById('token-wrapper');
const emailError    = document.getElementById('email-error');
const tokenError    = document.getElementById('token-error');
const loginBtn      = document.getElementById('login-btn');
const loginIcon     = document.getElementById('login-icon');
const loginLabel    = document.getElementById('login-label');
const googleBtn     = document.getElementById('google-btn');
const googleLabel   = document.getElementById('google-label');
const togglePw      = document.getElementById('toggle-pw');
const pwEye         = document.getElementById('pw-eye');
const recoverBtn    = document.getElementById('recover-btn');
const authOverlay   = document.getElementById('auth-overlay');
const overlayMsg    = document.getElementById('overlay-msg');
const toast         = document.getElementById('toast');
const toastMsg      = document.getElementById('toast-msg');
const toastIcon     = document.getElementById('toast-icon');
const persistent    = document.getElementById('persistent');

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
function showToast(msg, type = 'info') {
  const configs = {
    success: { bg: 'bg-surface-container border-secondary/40 text-secondary', icon: 'check_circle' },
    error:   { bg: 'bg-surface-container border-error/40 text-error', icon: 'error' },
    info:    { bg: 'bg-surface-container border-primary/40 text-primary', icon: 'info' },
  };
  const cfg = configs[type];
  toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-xl border backdrop-blur-xl font-metadata text-[11px] uppercase tracking-widest flex items-center gap-3 ${cfg.bg}`;
  toastMsg.textContent = msg;
  toastIcon.textContent = cfg.icon;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3500);
}

// ─────────────────────────────────────────────
//  INPUT FOCUS
// ─────────────────────────────────────────────
[emailInput, tokenInput].forEach(input => {
  const wrapper = input.parentElement.closest('.input-glow') ?? input.closest('.input-glow');
  input.addEventListener('focus', () => wrapper.classList.add('focused'));
  input.addEventListener('blur',  () => wrapper.classList.remove('focused'));
});

// ─────────────────────────────────────────────
//  SHOW / HIDE PASSWORD
// ─────────────────────────────────────────────
togglePw.addEventListener('click', () => {
  const isPassword = tokenInput.type === 'password';
  tokenInput.type = isPassword ? 'text' : 'password';
  pwEye.textContent = isPassword ? 'visibility_off' : 'visibility';
});

// ─────────────────────────────────────────────
//  VALIDATION
// ─────────────────────────────────────────────
function validateEmail(v) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
}
function setFieldError(wrapper, errorEl, show) {
  if (show) {
    wrapper.classList.add('input-error');
    errorEl.classList.add('show');
  } else {
    wrapper.classList.remove('input-error');
    errorEl.classList.remove('show');
  }
}

// ─────────────────────────────────────────────
//  AUTH SUCCESS HANDLER (shared)
// ─────────────────────────────────────────────
function handleAuthSuccess(user) {
  // Persist session if checkbox is checked
  const storage = persistent.checked ? localStorage : sessionStorage;
  storage.setItem('nimb_user', JSON.stringify({
    name:    user.name    || 'Operator',
    email:   user.email   || '',
    avatar:  user.picture || '',
    method:  user.method  || 'credentials',
    token:   user.token   || null,
    loginAt: Date.now(),
  }));

  overlayMsg.textContent = `Neural link estabelecido para ${user.name || user.email}`;
  authOverlay.classList.add('active');

  setTimeout(() => {
    window.location.href = REDIRECT_URL;
  }, 2200);
}

// ─────────────────────────────────────────────
//  EMAIL / PASSWORD LOGIN
//  (demo: aceita qualquer e-mail + senha ≥ 6 chars)
//  Em produção: substitua por uma chamada fetch() à sua API.
// ─────────────────────────────────────────────
loginBtn.addEventListener('click', async () => {
  const email = emailInput.value.trim();
  const pwd   = tokenInput.value;

  let hasError = false;
  if (!validateEmail(email)) {
    setFieldError(emailWrapper, emailError, true);
    hasError = true;
  } else {
    setFieldError(emailWrapper, emailError, false);
  }
  if (pwd.length < 6) {
    setFieldError(tokenWrapper, tokenError, true);
    hasError = true;
  } else {
    setFieldError(tokenWrapper, tokenError, false);
  }
  if (hasError) return;

  // Loading state
  loginBtn.disabled = true;
  loginIcon.innerHTML = '<span class="spinner"></span>';
  loginLabel.textContent = 'SYNCING NEURAL BRIDGE...';

  try {
    // ── PRODUCTION EXAMPLE ──────────────────────
    // const res = await fetch('/api/auth/login', {
    //   method: 'POST',
    //   headers: { 'Content-Type': 'application/json' },
    //   body: JSON.stringify({ email, password: pwd }),
    // });
    // if (!res.ok) throw new Error('Credenciais inválidas');
    // const data = await res.json();
    // handleAuthSuccess({ ...data.user, method: 'credentials', token: data.token });
    // ────────────────────────────────────────────

    // DEMO SIMULATION (remove in production)
    await new Promise(r => setTimeout(r, 1400));
    handleAuthSuccess({
      name: email.split('@')[0],
      email,
      method: 'credentials',
      token: 'demo-token-' + Date.now(),
    });

  } catch (err) {
    showToast(err.message || 'Falha ao estabelecer conexão.', 'error');
    loginBtn.disabled = false;
    loginIcon.textContent = 'login';
    loginLabel.textContent = 'ESTABLISH CONNECTION';
  }
});

// Enter key support
[emailInput, tokenInput].forEach(el => {
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') loginBtn.click();
  });
});

// ─────────────────────────────────────────────
//  GOOGLE OAUTH — Google Identity Services
// ─────────────────────────────────────────────

// Called by Google GIS after the user picks an account
function handleGoogleCredential(response) {
  // response.credential is a signed JWT (ID token)
  const idToken = response.credential;

  // Decode payload (header.payload.signature — no verification needed client-side)
  const payload = JSON.parse(atob(idToken.split('.')[1]));

  // ── PRODUCTION: send idToken to your backend for verification ───
  // fetch('/api/auth/google', {
  //   method: 'POST',
  //   headers: { 'Content-Type': 'application/json' },
  //   body: JSON.stringify({ credential: idToken }),
  // }).then(r => r.json()).then(data => handleAuthSuccess({ ...data.user, method: 'google', token: data.token }));
  // ────────────────────────────────────────────────────────────────

  // DEMO: use the JWT payload directly
  handleAuthSuccess({
    name:    payload.name,
    email:   payload.email,
    picture: payload.picture,
    method:  'google',
    token:   idToken,
  });
}

// Initialize GIS after script loads
window.addEventListener('load', () => {
  if (!window.google?.accounts?.id) {
    console.warn('[NIMB_OS] Google Identity Services not loaded. Configure GOOGLE_CLIENT_ID.');
    return;
  }

  google.accounts.id.initialize({
    client_id:         GOOGLE_CLIENT_ID,
    callback:          handleGoogleCredential,
    auto_select:       false,
    cancel_on_tap_outside: true,
    ux_mode:           'popup',
  });
});

// Manual trigger on button click
googleBtn.addEventListener('click', () => {
  if (!window.google?.accounts?.id) {
    showToast('Configure GOOGLE_CLIENT_ID para ativar OAuth.', 'info');
    return;
  }

  // Visual feedback
  googleLabel.textContent = 'Aguardando Google...';
  googleBtn.disabled = true;

  google.accounts.id.prompt(notification => {
    googleBtn.disabled = false;
    googleLabel.textContent = 'Login via Google';

    if (notification.isNotDisplayed()) {
      showToast('Popup bloqueado. Verifique as permissões do navegador.', 'error');
    } else if (notification.isSkippedMoment()) {
      showToast('Login cancelado pelo operador.', 'info');
    }
  });
});

// ─────────────────────────────────────────────
//  PASSWORD RECOVERY
// ─────────────────────────────────────────────
recoverBtn.addEventListener('click', () => {
  const email = emailInput.value.trim();
  if (!validateEmail(email)) {
    setFieldError(emailWrapper, emailError, true);
    showToast('Insira um e-mail válido para recuperação.', 'error');
    emailInput.focus();
    return;
  }
  // In production: POST to /api/auth/recover
  showToast(`Link de recuperação enviado para ${email}`, 'success');
});

// ─────────────────────────────────────────────
//  MOUSE PARALLAX
// ─────────────────────────────────────────────
document.addEventListener('mousemove', (e) => {
  const container = document.querySelector('main');
  const xAxis = (window.innerWidth  / 2 - e.pageX) / 50;
  const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
  container.style.transform = `perspective(1000px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
});

// ─────────────────────────────────────────────
//  AUTO-RESTORE SESSION
// ─────────────────────────────────────────────
;(function checkExistingSession() {
  const user = JSON.parse(sessionStorage.getItem('nimb_user') || localStorage.getItem('nimb_user') || 'null');
  if (user?.token) {
    overlayMsg.textContent = `Restaurando sessão de ${user.name || user.email}...`;
    authOverlay.classList.add('active');
    setTimeout(() => { window.location.href = REDIRECT_URL; }, 1500);
  }
})();
</script>
</body>
